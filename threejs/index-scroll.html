<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolyCity — Scroll Flythrough</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body { background: #E8EAEC; height: 100%; overflow: hidden; }
    canvas { display: block; position: fixed; inset: 0; z-index: 1; }

    /* Scroll container — only visible when standalone (not in iframe) */
    #scroll-track {
      position: fixed; inset: 0; z-index: 2;
      overflow-y: scroll; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    #scroll-track::-webkit-scrollbar { width: 0; }
    #scroll-spacer { height: 600vh; pointer-events: none; }

    #loading {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(135deg, #ff6b9d 0%, #c44dff 50%, #6bc5ff 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Trebuchet MS', 'Comic Sans MS', sans-serif;
      transition: opacity 0.8s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading h1 {
      font-size: 4rem; color: white; text-shadow: 3px 3px 0 #ff00aa, -2px -2px 0 #00ccff;
      letter-spacing: 0.15em; margin-bottom: 1rem;
    }
    #loading p { color: rgba(255,255,255,0.9); font-size: 1.2rem; letter-spacing: 0.3em; }
    #loading .bar { width: 300px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px; margin-top: 2rem; overflow: hidden; }
    #loading .bar-fill { height: 100%; background: white; border-radius: 4px; width: 0%; transition: width 0.3s; }

    /* Scroll indicator */
    #scroll-hint {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 10; font-family: 'Trebuchet MS', sans-serif; color: #333;
      background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
      padding: 10px 24px; border-radius: 30px; font-size: 0.85rem;
      letter-spacing: 0.1em; border: 1px solid rgba(0,0,0,0.1);
      transition: opacity 0.6s ease;
      animation: pulse-hint 2s ease-in-out infinite;
    }
    #scroll-hint.hidden { opacity: 0; pointer-events: none; }
    @keyframes pulse-hint {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-5px); }
    }

    /* Progress bar */
    #progress {
      position: fixed; top: 0; left: 0; height: 3px; z-index: 20;
      background: linear-gradient(90deg, #ff69b4, #c44dff, #00e5ff);
      width: 0%; transition: width 0.1s linear;
    }
  </style>
</head>
<body>
  <div id="loading" class="hidden"></div>
  <div id="bar-fill" style="display:none"></div>
  <div id="progress"></div>
  <div id="scroll-hint" class="hidden"></div>
  <div id="scroll-track"><div id="scroll-spacer"></div></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

    // ─── SCENE ───
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#E8EAEC');
    scene.fog = new THREE.FogExp2('#b8d8f8', 0.001);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(90, 60, 90);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.BasicShadowMap;
    renderer.toneMapping = THREE.LinearToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // ─── POST PROCESSING ───
    const halfW = Math.floor(window.innerWidth / 2);
    const halfH = Math.floor(window.innerHeight / 2);
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(halfW, halfH),
      0.4, 0.4, 0.9
    );
    composer.addPass(bloomPass);

    // ─── PS1 SHADER ───
    const PS1Shader = {
      uniforms: {
        tDiffuse: { value: null },
        resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        pixelSize: { value: 3.0 },
        colorDepth: { value: 24.0 },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform vec2 resolution;
        uniform float pixelSize;
        uniform float colorDepth;
        varying vec2 vUv;

        float dither4x4(vec2 pos) {
          int x = int(mod(pos.x, 4.0));
          int y = int(mod(pos.y, 4.0));
          int idx = x + y * 4;
          float m[16];
          m[0]=0.0;  m[1]=8.0;  m[2]=2.0;  m[3]=10.0;
          m[4]=12.0; m[5]=4.0;  m[6]=14.0; m[7]=6.0;
          m[8]=3.0;  m[9]=11.0; m[10]=1.0; m[11]=9.0;
          m[12]=15.0;m[13]=7.0; m[14]=13.0;m[15]=5.0;
          for (int i = 0; i < 16; i++) {
            if (i == idx) return m[i] / 16.0 - 0.5;
          }
          return 0.0;
        }

        void main() {
          vec2 pixelUv = floor(vUv * resolution / pixelSize) * pixelSize / resolution;
          vec4 color = texture2D(tDiffuse, pixelUv);
          vec2 pixelPos = vUv * resolution / pixelSize;
          float dither = dither4x4(pixelPos) / colorDepth;
          color.rgb = floor((color.rgb + dither) * colorDepth) / colorDepth;
          gl_FragColor = color;
        }
      `
    };
    const ps1Pass = new ShaderPass(PS1Shader);
    composer.addPass(ps1Pass);

    // ─── LIGHTING ───
    scene.add(new THREE.AmbientLight('#ffffff', 1.5));

    const dirLight = new THREE.DirectionalLight('#fffaf0', 1.8);
    dirLight.position.set(15, 30, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    dirLight.shadow.camera.left = -55;
    dirLight.shadow.camera.right = 55;
    dirLight.shadow.camera.top = 55;
    dirLight.shadow.camera.bottom = -55;
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight('#e8f0ff', 0.8);
    fillLight.position.set(-12, 18, -8);
    scene.add(fillLight);

    const pinkLight = new THREE.PointLight('#ff69b4', 1.2, 30);
    pinkLight.position.set(-8, 8, 5);
    scene.add(pinkLight);

    const cyanLight = new THREE.PointLight('#00e5ff', 1.2, 30);
    cyanLight.position.set(8, 8, -5);
    scene.add(cyanLight);

    const warmLight = new THREE.PointLight('#ffaa44', 0.8, 25);
    warmLight.position.set(0, 5, 0);
    scene.add(warmLight);

    scene.add(new THREE.HemisphereLight('#ddeeff', '#fff0dd', 0.7));

    // ─── SCROLL-DRIVEN CAMERA SYSTEM ───
    // Simple, clean path. Camera always looks at city center (0,2,0).
    // This guarantees smooth rotation — camera just orbits around one point.
    // Street-level segments stay on roads.
    const cameraPath = new THREE.CatmullRomCurve3([
      // Aerial establishing
      new THREE.Vector3(90, 60, 90),
      // Descend
      new THREE.Vector3(50, 35, 55),
      // Above rooftops, approaching Z-road
      new THREE.Vector3(10, 20, 48),
      // Drop onto Z-road
      new THREE.Vector3(1.5, 4, 38),
      // Cruising Z-road
      new THREE.Vector3(1.5, 3, 22),
      // Nearing intersection
      new THREE.Vector3(1.5, 3, 10),
      // Through intersection — rise slightly
      new THREE.Vector3(0, 6, 0),
      // Continue past intersection on X-road side
      new THREE.Vector3(-10, 3.5, -1.5),
      // Cruising X-road
      new THREE.Vector3(-25, 3, -1.5),
      // Rising off X-road
      new THREE.Vector3(-40, 15, -1.5),
      // Sweep south-west — continuing forward, not reversing
      new THREE.Vector3(-48, 30, -20),
      // Sweep south
      new THREE.Vector3(-35, 40, -45),
      // Sweep south-east
      new THREE.Vector3(10, 48, -50),
      // Sweep east
      new THREE.Vector3(50, 50, -15),
      // Sweep north-east
      new THREE.Vector3(60, 48, 40),
      // Returning to start
      new THREE.Vector3(70, 52, 70),
      // Loop close
      new THREE.Vector3(90, 60, 90),
    ], false, 'catmullrom', 0.2);

    // LookAt: always city center. Simple = smooth = no surprises.
    const LOOK_TARGET = new THREE.Vector3(0, 2, 0);

    // FOV keyframes
    const fovKeyframes = [
      { t: 0.00, fov: 45 },
      { t: 0.15, fov: 50 },
      { t: 0.25, fov: 60 },
      { t: 0.35, fov: 65 },
      { t: 0.42, fov: 70 },
      { t: 0.52, fov: 60 },
      { t: 0.62, fov: 48 },
      { t: 1.00, fov: 45 },
    ];

    function getFovAtProgress(p) {
      for (let i = 0; i < fovKeyframes.length - 1; i++) {
        if (p >= fovKeyframes[i].t && p <= fovKeyframes[i + 1].t) {
          const localT = (p - fovKeyframes[i].t) / (fovKeyframes[i + 1].t - fovKeyframes[i].t);
          // Smooth interpolation
          const smooth = localT * localT * (3 - 2 * localT);
          return fovKeyframes[i].fov + (fovKeyframes[i + 1].fov - fovKeyframes[i].fov) * smooth;
        }
      }
      return fovKeyframes[fovKeyframes.length - 1].fov;
    }

    // Scroll state
    let scrollProgress = 0;        // Target (from scroll input)
    let smoothProgress = 0;         // Current (smoothed)
    let isEmbedded = false;         // Whether we're in an iframe

    // Detect if we're in an iframe
    try { isEmbedded = window.self !== window.top; } catch (e) { isEmbedded = true; }

    // Native scroll (standalone mode)
    const scrollTrack = document.getElementById('scroll-track');
    scrollTrack.addEventListener('scroll', () => {
      const maxScroll = scrollTrack.scrollHeight - scrollTrack.clientHeight;
      scrollProgress = Math.max(0, Math.min(1, scrollTrack.scrollTop / maxScroll));
    }, { passive: true });

    // postMessage scroll (iframe / Framer mode)
    window.addEventListener('message', (e) => {
      if (e.data && typeof e.data.type === 'string' && e.data.type === 'scroll') {
        scrollProgress = Math.max(0, Math.min(1, e.data.progress));
      }
    });

    // Wheel + touch events for iframe mode
    if (isEmbedded) {
      // Hide scroll track in iframe mode — Framer controls the scroll
      scrollTrack.style.display = 'none';
      let accumScroll = 0;
      // Wheel events (desktop)
      window.addEventListener('wheel', (e) => {
        e.preventDefault();
        accumScroll += e.deltaY * 0.0003;
        scrollProgress = Math.max(0, Math.min(1, accumScroll));
      }, { passive: false });
      // Touch events (mobile)
      let touchStartY = 0;
      let touchAccumAtStart = 0;
      window.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
        touchAccumAtStart = accumScroll;
      }, { passive: true });
      window.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const deltaY = touchStartY - e.touches[0].clientY;
        accumScroll = touchAccumAtStart + deltaY * 0.0008;
        scrollProgress = Math.max(0, Math.min(1, accumScroll));
      }, { passive: false });
    }

    // Update progress bar
    const progressBar = document.getElementById('progress');
    const scrollHint = document.getElementById('scroll-hint');

    // ─── GROUND ───
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(55, 32),
      new THREE.MeshStandardMaterial({ color: '#E8EAEC', roughness: 0.85, metalness: 0.1 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Roads
    const roadMat = new THREE.MeshStandardMaterial({ color: '#333333', roughness: 0.9 });
    const road1 = new THREE.Mesh(new THREE.PlaneGeometry(6, 110), roadMat);
    road1.rotation.x = -Math.PI / 2; road1.position.y = 0.01;
    scene.add(road1);
    const road2 = road1.clone(); road2.rotation.z = Math.PI / 2;
    scene.add(road2);

    // Road stripes
    const stripeMat = new THREE.MeshStandardMaterial({
      color: '#E8EAEC', emissive: '#E8EAEC', emissiveIntensity: 0.2
    });
    for (let i = -54; i <= 54; i += 3) {
      if (Math.abs(i) < 4) continue;
      const s1 = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 1.5), stripeMat);
      s1.rotation.x = -Math.PI / 2; s1.position.set(0, 0.02, i);
      scene.add(s1);
      const s2 = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.3), stripeMat);
      s2.rotation.x = -Math.PI / 2; s2.position.set(i, 0.02, 0);
      scene.add(s2);
    }

    // Sidewalks
    const sidewalkMat = new THREE.MeshStandardMaterial({ color: '#c8cacc', roughness: 0.95 });
    const swWidth = 2, swY = 0.08, swGap = 5, swHalfLen = 55;
    const swSegLen = swHalfLen - swGap;

    for (const xSign of [1, -1]) {
      for (const zSign of [1, -1]) {
        const sw = new THREE.Mesh(new THREE.BoxGeometry(swWidth, 0.1, swSegLen), sidewalkMat);
        sw.position.set(xSign * (3 + swWidth/2), swY/2, zSign * (swGap + swSegLen/2));
        scene.add(sw);
      }
    }
    for (const zSign of [1, -1]) {
      for (const xSign of [1, -1]) {
        const sw = new THREE.Mesh(new THREE.BoxGeometry(swSegLen, 0.1, swWidth), sidewalkMat);
        sw.position.set(xSign * (swGap + swSegLen/2), swY/2, zSign * (3 + swWidth/2));
        scene.add(sw);
      }
    }
    for (const xSign of [1, -1]) {
      for (const zSign of [1, -1]) {
        const corner = new THREE.Mesh(new THREE.BoxGeometry(swWidth, 0.1, swWidth), sidewalkMat);
        corner.position.set(xSign * (3 + swWidth/2), swY/2, zSign * (3 + swWidth/2));
        scene.add(corner);
      }
    }

    // Grid
    const grid = new THREE.GridHelper(100, 30, 0xcccccc, 0xdddddd);
    grid.material.opacity = 0.3;
    grid.material.transparent = true;
    scene.add(grid);

    // ─── COLLISION SYSTEM ───
    const colliders = [];
    const ROAD_HALF = 3.5;

    function addCollider(model) {
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const r = Math.max(size.x, size.z) * 0.5;
      colliders.push({ x: center.x, z: center.z, r });
    }

    function resolveCollisions(pos, charRadius) {
      for (const c of colliders) {
        const dx = pos.x - c.x, dz = pos.z - c.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const minDist = c.r + charRadius;
        if (dist < minDist && dist > 0.001) {
          const push = (minDist - dist) / dist;
          pos.x += dx * push; pos.z += dz * push;
        }
      }
      if (Math.abs(pos.x) < ROAD_HALF && Math.abs(pos.z) > ROAD_HALF) pos.x = Math.sign(pos.x || 1) * ROAD_HALF;
      if (Math.abs(pos.z) < ROAD_HALF && Math.abs(pos.x) > ROAD_HALF) pos.z = Math.sign(pos.z || 1) * ROAD_HALF;
      if (Math.abs(pos.x) < ROAD_HALF && Math.abs(pos.z) < ROAD_HALF) {
        if (Math.abs(pos.x) > Math.abs(pos.z)) pos.z = Math.sign(pos.z || 1) * ROAD_HALF;
        else pos.x = Math.sign(pos.x || 1) * ROAD_HALF;
      }
      const distFromCenter = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
      if (distFromCenter > 48) { pos.x *= 48 / distFromCenter; pos.z *= 48 / distFromCenter; }
    }

    function isPointClear(x, z, radius) {
      for (const c of colliders) {
        const dx = x - c.x, dz = z - c.z;
        if (Math.sqrt(dx * dx + dz * dz) < c.r + radius) return false;
      }
      return true;
    }

    function pickWanderTarget(fromX, fromZ) {
      for (let tries = 0; tries < 30; tries++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 4 + Math.random() * 35;
        const x = Math.cos(angle) * dist, z = Math.sin(angle) * dist;
        if (Math.abs(x) < ROAD_HALF + 1 || Math.abs(z) < ROAD_HALF + 1) continue;
        if (x * x + z * z > 46 * 46) continue;
        if (!isPointClear(x, z, 1.5)) continue;
        return { x, z };
      }
      const fa = Math.random() * Math.PI * 2;
      return { x: Math.max(-44, Math.min(44, (fromX || 0) + Math.cos(fa) * 8)), z: Math.max(-44, Math.min(44, (fromZ || 0) + Math.sin(fa) * 8)) };
    }

    // ─── LOADING SYSTEM ───
    const loader = new GLTFLoader();
    const ASSETS = '../assets/';

    // Sky background
    const skyCanvas = document.createElement('canvas');
    skyCanvas.width = 2; skyCanvas.height = 512;
    const ctx = skyCanvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, '#4a90d9');
    grad.addColorStop(0.4, '#7eb8e8');
    grad.addColorStop(0.7, '#b8daf0');
    grad.addColorStop(1.0, '#e8f0f6');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 2, 512);
    const skyTex = new THREE.CanvasTexture(skyCanvas);
    skyTex.mapping = THREE.EquirectangularReflectionMapping;
    scene.background = skyTex;

    const mixers = [];
    const animatedObjects = [];
    let loaded = 0, totalLoads = 0;

    function dismissLoading() {
      document.getElementById('bar-fill').style.width = '100%';
      setTimeout(() => document.getElementById('loading').classList.add('hidden'), 400);
    }
    setTimeout(dismissLoading, 10000);

    function loadGLB(file, pos, rot, targetH, opts = {}) {
      totalLoads++;
      return new Promise(resolve => {
        loader.load(ASSETS + file, gltf => {
          const m = gltf.scene;
          const box = new THREE.Box3().setFromObject(m);
          const size = box.getSize(new THREE.Vector3());
          const s = targetH / (size.y || 1);
          m.scale.setScalar(s);
          box.setFromObject(m);
          m.position.set(pos[0], -box.min.y + (pos[1] || 0), pos[2]);
          if (rot) m.rotation.set(rot[0], rot[1], rot[2]);
          m.traverse(c => {
            if (c.isMesh) {
              c.castShadow = !opts.animate;
              c.receiveShadow = true;
              if (c.material.map) c.material.map.colorSpace = THREE.SRGBColorSpace;
            }
          });
          scene.add(m);
          if (gltf.animations.length > 0) {
            const mixer = new THREE.AnimationMixer(m);
            gltf.animations.forEach(clip => mixer.clipAction(clip).play());
            mixers.push(mixer);
          }
          if (opts.animate) animatedObjects.push({ model: m, ...opts.animate });
          if (!opts.animate && !opts.noColl) addCollider(m);
          loaded++;
          document.getElementById('bar-fill').style.width = (loaded / Math.max(totalLoads, 1) * 100) + '%';
          resolve(m);
        }, undefined, () => { loaded++; resolve(null); });
      });
    }

    // ─── BUILD THE TOWN ───
    async function buildCity() {
      const bldg = {};
      bldg.A1     = loadGLB('building-A.glb',    [14, 0, -9],  [0, -Math.PI/2, 0], 8);
      bldg.B1     = loadGLB('building-B.glb',    [15, 0, -16], [0, Math.PI, 0],    7);
      bldg.sky1   = loadGLB('skyscraper.glb',    [15, 0, -22], [0, 0, 0],          12);
      bldg.C1     = loadGLB('building-C.glb',    [14, 0, 9],   [0, -Math.PI/2, 0], 9);
      bldg.town1  = loadGLB('town-house.glb',    [15, 0, 16],  [0, -Math.PI/2, 0], 8);
      bldg.D1     = loadGLB('building-D.glb',    [-14, 0, -9], [0, Math.PI/2, 0],  9);
      bldg.E1     = loadGLB('building-E.glb',    [-15, 0, -16],[0, 0, 0],           7);
      bldg.tc1    = loadGLB('town-center.glb',   [-15, 0, -22],[0, Math.PI, 0],     7);
      bldg.F1     = loadGLB('building-F.glb',    [-14, 0, 9],  [0, Math.PI/2, 0],  8);
      bldg.small1 = loadGLB('building-small.glb',[-15, 0, 16], [0, 0, 0],           6);
      bldg.backA  = loadGLB('building-A.glb',    [-14, 0, -30], [0, 0, 0],          10);
      bldg.backB  = loadGLB('building-B.glb',    [14, 0, -30],  [0, 0, 0],          10);

      // Characters
      loadGLB('platformer-character.glb', [7, 0, 7],    [0, 0.9, 0],  2.0, { animate: { type: 'bounce', speed: 2, amplitude: 0.2 } });
      loadGLB('panda.glb',               [-7, 0, 9],   [0, 2.2, 0],  1.8, { animate: { type: 'walk', speed: 0.3, radius: 1.5 } });
      loadGLB('rabbit-blond.glb',         [7, 0, -10],  [0, -0.6, 0], 1.6, { animate: { type: 'walk', speed: 0.5, radius: 1.5 } });
      loadGLB('robot.glb',               [-7, 0, -10],  [0, 1.6, 0],  1.8, { animate: { type: 'bounce', speed: 3, amplitude: 0.25 } });
      loadGLB('mako.glb',                [7, 0, 12],   [0, Math.PI, 0], 1.8, { animate: { type: 'walk', speed: 0.4, radius: 1.5 } });
      loadGLB('astronaut.glb',           [-7, 0, -14], [0, 0, 0],    2.0, { animate: { type: 'bounce', speed: 1.5, amplitude: 0.15 } });
      loadGLB('shiba.glb',        [7, 0, 16],   [0, 1.2, 0],  1.0, { animate: { type: 'walk', speed: 0.6, radius: 1.5 } });
      loadGLB('cat.glb',          [-7, 0, 18],  [0, -0.5, 0], 0.8, { animate: { type: 'walk', speed: 0.4, radius: 1.5 } });
      loadGLB('wizard.glb',       [7, 0, -22],  [0, 0.8, 0],  1.8, { animate: { type: 'bounce', speed: 1.5, amplitude: 0.15 } });

      new THREE.TorusKnotGeometry(0.3, 0.1, 24, 6),
      new THREE.DodecahedronGeometry(0.35),
    ];
    const y2kColors = ['#ff69b4', '#00e5ff', '#c44dff', '#ffaa44', '#6bc5ff', '#ff4488'];
    for (let i = 0; i < 35; i++) {
      const color = y2kColors[i % y2kColors.length];
      const mesh = new THREE.Mesh(
        geos[Math.floor(Math.random() * geos.length)],
        new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.5, metalness: 0.8, roughness: 0.2 })
      );
      const baseY = Math.random() * 14 + 8;
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * 55;
      mesh.position.set(Math.cos(angle) * dist, baseY, Math.sin(angle) * dist);
      mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
      scene.add(mesh);
      y2kShapes.push({ mesh, baseY, rx: (Math.random()-0.5)*0.02, ry: (Math.random()-0.5)*0.02, fSpeed: Math.random()*0.5+0.5, fAmp: Math.random()*0.5+0.3, phase: Math.random()*Math.PI*2 });
    }

    // ─── NEON SIGNS ───
    function makeSign(text, pos, color, size = 0.8) {
      const canvas = document.createElement('canvas');
      canvas.width = 512; canvas.height = 128;
      const signCtx = canvas.getContext('2d');
      signCtx.clearRect(0, 0, 512, 128);
      signCtx.font = `bold 60px "Trebuchet MS", sans-serif`;
      signCtx.textAlign = 'center'; signCtx.textBaseline = 'middle';
      signCtx.shadowColor = color; signCtx.shadowBlur = 30;
      signCtx.fillStyle = color;
      signCtx.fillText(text, 256, 64);
      signCtx.shadowBlur = 50;
      signCtx.fillText(text, 256, 64);
      const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(4*size, 1*size),
        new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false })
      );
      mesh.position.set(...pos);
      scene.add(mesh);
      return mesh;
    }
    const sign1 = makeSign('★ カフェ ★', [7.5, 5.5, 0], '#ff69b4');
    sign1.rotation.y = -Math.PI / 2;
    const sign2 = makeSign('ゲーム', [-7.5, 6, -4], '#00e5ff');
    sign2.rotation.y = Math.PI / 2;
    makeSign('ラーメン', [0, 6.5, -15], '#ffaa44');

    // ─── STARS ───
    const starShape = new THREE.Shape();
    for (let i = 0; i < 10; i++) {
      const r = i % 2 === 0 ? 0.4 : 0.18;
      const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
      i === 0 ? starShape.moveTo(Math.cos(a)*r, Math.sin(a)*r) : starShape.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    starShape.closePath();
    const starGeo = new THREE.ExtrudeGeometry(starShape, { depth: 0.1, bevelEnabled: false });
    const stars = [];
    [[4,9,-8],[-4,8,6],[6,10,4],[-6,9,-6],[2,11,-2],[-2,10,8],[0,12,-10],
     [25,10,20],[-30,9,25],[35,11,-22],[-20,10,-35],[40,8,35],[-40,9,-30],[45,10,12],[-45,11,-18]].forEach((pos, i) => {
      const color = y2kColors[i % y2kColors.length];
      const star = new THREE.Mesh(starGeo, new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.6, metalness: 0.9, roughness: 0.1 }));
      star.position.set(...pos);
      scene.add(star);
      stars.push(star);
    });

    // ─── BIRDS ───
    const birds = [];
    const birdGeo = new THREE.BufferGeometry();
    const bv = new Float32Array([-0.5,0,0, 0,0,-0.15, 0,0.08,0, 0.5,0,0, 0,0,-0.15, 0,0.08,0]);
    birdGeo.setAttribute('position', new THREE.BufferAttribute(bv, 3));
    birdGeo.computeVertexNormals();
    const birdMat = new THREE.MeshBasicMaterial({ color: '#1a1a2e', side: THREE.DoubleSide });
    for (let i = 0; i < 7; i++) {
      const bird = new THREE.Mesh(birdGeo, birdMat);
      bird.scale.setScalar(0.4 + Math.random() * 0.3);
      scene.add(bird);
      birds.push({ mesh: bird, orbitR: 15 + Math.random() * 30, height: 22 + Math.random() * 12, speed: 0.15 + Math.random() * 0.2, phase: Math.random() * Math.PI * 2, flapPhase: Math.random() * Math.PI * 2 });
    }

    // ─── FOUNTAIN SPRAY ───
    const fountainSprays = [];
    const sprayCount = 40;
    const sprayMat = new THREE.PointsMaterial({ color: '#aaddff', size: 0.12, transparent: true, opacity: 0.6, depthWrite: false });
    for (const fp of fountainPositions) {
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(sprayCount * 3), 3));
      const points = new THREE.Points(geo, sprayMat);
      points.position.set(fp[0], fp[1], fp[2]);
      scene.add(points);
      const droplets = [];
      for (let i = 0; i < sprayCount; i++) {
        droplets.push({ phase: Math.random() * Math.PI * 2, speed: 0.8 + Math.random() * 1.2, spreadX: (Math.random() - 0.5) * 0.4, spreadZ: (Math.random() - 0.5) * 0.4, delay: Math.random() });
      }
      fountainSprays.push({ points, droplets });
    }

    // ─── KAOMOJI REACTION SYSTEM (3D planes, face character direction) ───
    const kaomoji = [
      '⸜(｡˃ᵕ˂)⸝♡', '♡(˶ᵔᵕᵔ˶)', '(˶ᵔᗜᵔ˶)', '✧٩(ˊᗜˋ*)و✧',
      '(˶˃ᵕ˂˶)', '◝(ᵔᗜᵔ)◜', '(ෆ˙ᵕ˙ෆ)♡', '(˶>⩊<˶)',
      'ꉂ(˵˃ᗜ˂˵)', '(੭˃ᴗ˂)੭', '₍^.^₎⟆', '(„•ᴗ•„)੭',
      '(っ˘ڡ˘ς)', '(๑>◡<๑)', 'ᕙ(•̀ᗜ•́)ᕗ', '(づ๑•ᴗ•๑)づ♡',
      '૮꒰˶•༝•˶꒱ა♡', '₍ᐢ.ᐢ₎', '(⸝⸝ᵕᴗᵕ⸝⸝)', 'ദ്ദി(ᵔᗜᵔ)',
      '≽^•⩊•^≼', 'ฅ^>⩊<^ฅ', '(˶ᵔᵕᵔ˶)‹𝟹', '(ᵕ‿ᵕ)',
      '৻(•̀ᗜ•́৻)', '(˶ˆᗜˆ˵)', '૮₍´꒳`₎ა', '(⸝⸝>ᴗ•⸝⸝)',
    ];

    // Create a 3D kaomoji mesh (double-sided plane with canvas text)
    function createKaomojiMesh() {
      const canvas = document.createElement('canvas');
      canvas.width = 512; canvas.height = 128;
      const geo = new THREE.PlaneGeometry(2.0, 0.5);
      const mat = new THREE.MeshBasicMaterial({
        transparent: true, depthWrite: false, side: THREE.DoubleSide, opacity: 1
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData._canvas = canvas;
      mesh.visible = false;
      scene.add(mesh);
      return mesh;
    }

    function setKaomojiText(mesh, text) {
      const canvas = mesh.userData._canvas;
      const ctx2 = canvas.getContext('2d');
      ctx2.clearRect(0, 0, 512, 128);
      // Background pill
      ctx2.fillStyle = 'rgba(255,255,255,0.85)';
      const textWidth = ctx2.measureText(text).width || 300;
      const pillW = Math.min(480, textWidth + 60);
      const pillX = (512 - pillW) / 2;
      ctx2.beginPath();
      ctx2.roundRect(pillX, 16, pillW, 96, 48);
      ctx2.fill();
      // Text
      ctx2.font = 'bold 42px "Trebuchet MS", "Segoe UI", sans-serif';
      ctx2.textAlign = 'center'; ctx2.textBaseline = 'middle';
      ctx2.fillStyle = '#333';
      ctx2.fillText(text, 256, 64);
      mesh.material.map = new THREE.CanvasTexture(canvas);
      mesh.material.needsUpdate = true;
    }

    // Pool
    const kaomojiPool = [];
    for (let i = 0; i < 20; i++) kaomojiPool.push(createKaomojiMesh());

    const activeEmojis = [];

    function spawnEmoji(x, y, z, rotY) {
      const mesh = kaomojiPool.find(m => !m.visible);
      if (!mesh) return;
      const text = kaomoji[Math.floor(Math.random() * kaomoji.length)];
      setKaomojiText(mesh, text);
      mesh.position.set(x, y, z);
      mesh.rotation.set(0, rotY || 0, 0);
      mesh.material.opacity = 1;
      mesh.visible = true;
      mesh.scale.set(0.01, 0.01, 0.01);
      activeEmojis.push({ mesh, timer: 0, startY: y });
    }

    function elasticOut(t) {
      if (t === 0 || t === 1) return t;
      return Math.pow(2, -10 * t) * Math.sin((t - 0.1) * 5 * Math.PI) + 1;
    }

    // Also spawn random emojis on characters periodically (not just when meeting)
    const emojiCooldowns = new Map();

    const conversations = [];
    const MEET_DIST = 4.0, TALK_TIME = 3.0;

    // ─── ANIMATION LOOP ───
    const clock = new THREE.Clock();
    const lookAtTarget = new THREE.Vector3(0, 2, 0);

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05); // cap dt to prevent jumps on tab-switch
      const t = clock.getElapsedTime();

      // ─── SMOOTH SCROLL INTERPOLATION ───
      // Time-based exponential smoothing — consistent across frame rates
      const scrollSmooth = 1 - Math.exp(-2.0 * dt);
      smoothProgress += (scrollProgress - smoothProgress) * scrollSmooth;

      const p = Math.max(0, Math.min(1, smoothProgress));

      // ─── CAMERA FROM SPLINE ───
      const camPos = cameraPath.getPointAt(p);
      const fov = getFovAtProgress(p);

      camera.position.copy(camPos);
      camera.lookAt(LOOK_TARGET);
      camera.fov = fov;
      camera.updateProjectionMatrix();

      // Update progress bar
      progressBar.style.width = (p * 100) + '%';

      // Hide scroll hint after first scroll
      if (p > 0.02) scrollHint.classList.add('hidden');

      // ─── FOG — lighter when far so city is visible, thickens slightly at street level for atmosphere ───
      if (p < 0.25) {
        // Aerial: very light fog so city is visible from distance
        scene.fog.density = 0.001 + p * 0.004; // 0.001 → 0.002
      } else if (p < 0.5) {
        // Entering streets: slight atmospheric fog
        scene.fog.density = 0.002;
      } else {
        // Street level and beyond: gentle fog for depth
        scene.fog.density = 0.0015;
      }

      // Animation mixers
      mixers.forEach(m => m.update(dt));

      // Character animations + collision
      const CHAR_RADIUS = 0.6;
      animatedObjects.forEach(o => {
        if (!o.model) return;
        if (o.type === 'bounce' || o.type === 'walk') {
          const ud = o.model.userData;
          if (o.type === 'bounce' && ud._baseY == null) ud._baseY = o.model.position.y;
          if (ud._talking) {
            if (o.type === 'bounce') o.model.position.y = (ud._baseY || 0) + Math.abs(Math.sin(t * o.speed)) * o.amplitude;
            return;
          }
          if (!ud._targetX) {
            const tgt = pickWanderTarget(o.model.position.x, o.model.position.z);
            ud._targetX = tgt.x; ud._targetZ = tgt.z;
            ud._stuckTimer = 0; ud._stuckX = o.model.position.x; ud._stuckZ = o.model.position.z;
          }
          const dx = ud._targetX - o.model.position.x;
          const dz = ud._targetZ - o.model.position.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          const walkSpeed = (o.speed || 0.4) * 2.5;
          if (dist > 0.5) {
            o.model.position.x += (dx / dist) * walkSpeed * dt;
            o.model.position.z += (dz / dist) * walkSpeed * dt;
          }
          const preX = o.model.position.x, preZ = o.model.position.z;
          resolveCollisions(o.model.position, CHAR_RADIUS);
          const pushDx = o.model.position.x - preX, pushDz = o.model.position.z - preZ;
          if (pushDx * pushDx + pushDz * pushDz > 0.001) {
            ud._hitCount = (ud._hitCount || 0) + 1;
            if (ud._hitCount > 3) {
              const tgt = pickWanderTarget(o.model.position.x, o.model.position.z);
              ud._targetX = tgt.x; ud._targetZ = tgt.z;
              ud._hitCount = 0; ud._stuckTimer = 0;
            }
          } else { ud._hitCount = 0; }
          if (o.type === 'bounce') o.model.position.y = (ud._baseY || 0) + Math.abs(Math.sin(t * o.speed)) * o.amplitude;
          const mx = o.model.position.x - (ud._prevX || o.model.position.x);
          const mz = o.model.position.z - (ud._prevZ || o.model.position.z);
          if (mx * mx + mz * mz > 0.0001) o.model.rotation.y = Math.atan2(mx, mz);
          ud._prevX = o.model.position.x; ud._prevZ = o.model.position.z;
          ud._stuckTimer = (ud._stuckTimer || 0) + dt;
          if (dist < 1.0 || ud._stuckTimer > 2) {
            const movedX = o.model.position.x - (ud._stuckX || 0);
            const movedZ = o.model.position.z - (ud._stuckZ || 0);
            if (dist < 1.0 || Math.sqrt(movedX * movedX + movedZ * movedZ) < 1.0) {
              const tgt = pickWanderTarget(o.model.position.x, o.model.position.z);
              ud._targetX = tgt.x; ud._targetZ = tgt.z;
            }
            ud._stuckTimer = 0; ud._stuckX = o.model.position.x; ud._stuckZ = o.model.position.z;
          }
        } else if (o.type === 'float') {
          o.model.position.y = 9 + Math.sin(t * o.speed) * o.amplitude;
        } else if (o.type === 'cloud') {
          if (o.model.userData._cx == null) o.model.userData._cx = o.model.position.x;
          o.model.position.x = o.model.userData._cx + Math.sin(t * o.speed * 0.15) * 15;
          o.model.position.y += Math.sin(t * 0.3 + o.model.position.x * 0.1) * 0.003;
        }
      });

      // ─── KAOMOJI REACTIONS ───
      const walkingChars = animatedObjects.filter(o => o.model && (o.type === 'walk' || o.type === 'bounce'));

      // Random reactions while walking
      for (const ch of walkingChars) {
        const id = ch.model.id;
        const cooldown = emojiCooldowns.get(id) || 0;
        if (t > cooldown && Math.random() < 0.005) {
          const pos = ch.model.position;
          spawnEmoji(pos.x, pos.y + 2.5, pos.z, ch.model.rotation.y);
          emojiCooldowns.set(id, t + 4 + Math.random() * 6);
        }
      }

      // Meeting reactions
      for (let i = 0; i < walkingChars.length; i++) {
        for (let j = i + 1; j < walkingChars.length; j++) {
          const a = walkingChars[i], b = walkingChars[j];
          const dx = a.model.position.x - b.model.position.x;
          const dz = a.model.position.z - b.model.position.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          if (dist < MEET_DIST) {
            const aId = a.model.id, bId = b.model.id;
            if (t > (emojiCooldowns.get(aId) || 0) && t > (emojiCooldowns.get(bId) || 0)) {
              spawnEmoji(a.model.position.x, a.model.position.y + 2.5, a.model.position.z, a.model.rotation.y);
              spawnEmoji(b.model.position.x, b.model.position.y + 2.5, b.model.position.z, b.model.rotation.y);
              emojiCooldowns.set(aId, t + 5 + Math.random() * 4);
              emojiCooldowns.set(bId, t + 5 + Math.random() * 4);
            }
          }
        }
      }

      // Animate kaomoji — pop in, float up, fade out
      for (let i = activeEmojis.length - 1; i >= 0; i--) {
        const e = activeEmojis[i];
        e.timer += dt;
        const duration = 2.5;
        const progress = e.timer / duration;

        if (progress >= 1) {
          e.mesh.visible = false;
          activeEmojis.splice(i, 1);
          continue;
        }

        // Elastic pop-in
        const scaleT = Math.min(e.timer / 0.35, 1);
        const s = elasticOut(scaleT);
        e.mesh.scale.set(s, s, s);

        // Float upward
        e.mesh.position.y = e.startY + e.timer * 0.6;

        // Fade out in last 30%
        if (progress > 0.7) {
          e.mesh.material.opacity = 1 - (progress - 0.7) / 0.3;
        }
      }

      // Petals
      const pp = petals.geometry.attributes.position.array;
      for (let i = 0; i < PETAL_COUNT; i++) {
        const j = i * 3;
        pp[j] += petalVel[i].x + Math.sin(t + petalPhase[i]) * 0.004;
        pp[j+1] += petalVel[i].y;
        pp[j+2] += petalVel[i].z + Math.cos(t + petalPhase[i]) * 0.004;
        if (pp[j+1] < 0) { pp[j] = (Math.random()-0.5)*100; pp[j+1] = 20+Math.random()*8; pp[j+2] = (Math.random()-0.5)*100; }
      }
      petals.geometry.attributes.position.needsUpdate = true;

      // Y2K shapes
      y2kShapes.forEach(s => {
        s.mesh.rotation.x += s.rx; s.mesh.rotation.y += s.ry;
        s.mesh.position.y = s.baseY + Math.sin(t * s.fSpeed + s.phase) * s.fAmp;
      });

      // Stars
      stars.forEach((star, i) => { star.rotation.z += 0.015 + i * 0.003; star.rotation.y += 0.01; });

      // Neon pulse
      const pulse = Math.sin(t * 2) * 0.5 + 0.5;
      pinkLight.intensity = 1.0 + pulse * 0.8;
      cyanLight.intensity = 1.0 + (1 - pulse) * 0.8;

      // Tree sway
      treeModels.forEach((tree, i) => {
        const w = t * 0.8 + i * 1.7;
        tree.rotation.z = Math.sin(w) * 0.025 + Math.sin(w * 1.7) * 0.012;
        tree.rotation.x = Math.cos(w * 0.7) * 0.015;
      });

      // Birds
      birds.forEach(b => {
        const angle = t * b.speed + b.phase;
        b.mesh.position.x = Math.cos(angle) * b.orbitR;
        b.mesh.position.z = Math.sin(angle) * b.orbitR;
        b.mesh.position.y = b.height + Math.sin(t * 0.5 + b.phase) * 1.5;
        b.mesh.rotation.y = -angle + Math.PI / 2;
        b.mesh.scale.y = 0.5 + Math.abs(Math.sin(t * 4 + b.flapPhase)) * 0.5;
      });

      // Fountain spray
      fountainSprays.forEach(f => {
        const arr = f.points.geometry.attributes.position.array;
        for (let i = 0; i < sprayCount; i++) {
          const d = f.droplets[i];
          const cycle = ((t * d.speed + d.delay) % 1);
          const j = i * 3;
          arr[j] = d.spreadX * cycle * 3;
          arr[j+1] = cycle * 2.2 - cycle * cycle * 2.5 + 0.8;
          arr[j+2] = d.spreadZ * cycle * 3;
        }
        f.points.geometry.attributes.position.needsUpdate = true;
      });

      // Sun
      const sunAngle = t * 0.02;
      dirLight.position.x = 15 + Math.sin(sunAngle) * 8;
      dirLight.position.z = 10 + Math.cos(sunAngle) * 8;

      // Cars — U-turn at road ends + intersection yielding
      const APPROACH_ZONE = 10;
      carObjects.forEach(c => {
        let shouldStop = false;
        const distToCenter = Math.abs(c.pos);

        // Yield at intersection: stop if a car on the OTHER axis is closer to center
        // Z-axis wins ties (tiebreaker prevents mutual deadlock)
        if (distToCenter < APPROACH_ZONE) {
          shouldStop = carObjects.some(other => {
            if (other === c || other.axis === c.axis) return false;
            const otherDist = Math.abs(other.pos);
            if (otherDist >= APPROACH_ZONE) return false;
            // Other car is closer — yield. On tie, X yields to Z.
            return otherDist < distToCenter || (otherDist === distToCenter && c.axis === 'x');
          });
        }

        if (!shouldStop) {
          c.pos += c.speed * dt * c.dir;
        }

        // U-turn at road ends
        if (c.pos > c.max || c.pos < c.min) {
          c.lane = -c.lane;
          c.dir = -c.dir;
        }

        if (c.axis === 'z') {
          c.model.position.z = c.pos; c.model.position.x = c.lane;
          c.model.rotation.y = c.dir > 0 ? 0 : Math.PI;
        } else {
          c.model.position.x = c.pos; c.model.position.z = c.lane;
          c.model.rotation.y = c.dir > 0 ? Math.PI/2 : -Math.PI/2;
        }
      });

      composer.render();
    }
    animate();

    // ─── RESIZE ───
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      ps1Pass.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
    });

    // polycity-ready is now sent after buildCity() resolves (all GLBs loaded)

    console.log('PolyCity SCROLL scene initialized');
    console.log('Accepts scroll via: native scroll, postMessage({ type: "scroll", progress: 0-1 }), or wheel events');
  </script>
